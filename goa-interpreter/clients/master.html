<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Master · Goa Interpreter</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<script src="https://cdn.jsdelivr.net/npm/livekit-client@2.7.4/dist/livekit-client.umd.min.js"></script>
<style>
  body { font: 16px/1.5 system-ui, sans-serif; max-width: 640px; margin: 3em auto; padding: 0 1em; }
  button { font: inherit; padding: .8em 1.4em; }
  .lvl { width: 100%; height: 24px; background: #eee; border-radius: 4px; overflow: hidden; }
  .lvl > div { height: 100%; background: linear-gradient(90deg, #4ade80, #f97316); width: 0; transition: width .05s; }
  .out { background: #f6f6f8; padding: 1em; border-radius: .5em; white-space: pre-wrap; }
</style>
</head>
<body>
  <h1>Master microphone</h1>
  <p id="status">starting…</p>
  <div class="lvl"><div id="lvl"></div></div>
  <p>
    <button id="connectBtn" disabled>Connect &amp; publish mic</button>
    <button id="disconnectBtn" disabled>Disconnect</button>
  </p>
  <div class="out" id="info"></div>

<script>
const params = new URLSearchParams(location.search);
const sessionId = params.get("session");
if (!sessionId) {
  document.body.innerHTML = "<p>missing ?session=… — go back to <a href='/'>/</a></p>";
  throw new Error("no session");
}

const stored = sessionStorage.getItem("session-" + sessionId);
let sess = stored ? JSON.parse(stored) : null;
let room = null;

async function bootstrap() {
  if (!sess) {
    document.getElementById("status").textContent =
      "session details not in storage — start session from /";
    return;
  }
  document.getElementById("status").textContent = "ready. click connect.";
  document.getElementById("info").textContent =
    `room: ${sess.master.room}\nurl: ${sess.livekit_url}`;
  document.getElementById("connectBtn").disabled = false;
}

async function connect() {
  const Lk = LivekitClient;
  room = new Lk.Room({ adaptiveStream: false, dynacast: false });
  await room.connect(sess.livekit_url, sess.master.token);
  const mic = await Lk.createLocalAudioTrack({
    echoCancellation: true, noiseSuppression: true, autoGainControl: true,
  });
  await room.localParticipant.publishTrack(mic);
  document.getElementById("status").textContent = "🎙 publishing mic to " + sess.master.room;
  document.getElementById("connectBtn").disabled = true;
  document.getElementById("disconnectBtn").disabled = false;

  // simple level meter
  const ctx = new AudioContext();
  const src = ctx.createMediaStreamSource(new MediaStream([mic.mediaStreamTrack]));
  const ana = ctx.createAnalyser(); ana.fftSize = 512;
  src.connect(ana);
  const buf = new Uint8Array(ana.fftSize);
  function draw() {
    ana.getByteTimeDomainData(buf);
    let peak = 0;
    for (const v of buf) { const d = Math.abs(v - 128); if (d > peak) peak = d; }
    document.getElementById("lvl").style.width = Math.min(100, peak * 1.5) + "%";
    requestAnimationFrame(draw);
  }
  draw();
}

document.getElementById("connectBtn").addEventListener("click", connect);
document.getElementById("disconnectBtn").addEventListener("click", async () => {
  if (room) await room.disconnect();
  document.getElementById("status").textContent = "disconnected";
  document.getElementById("disconnectBtn").disabled = true;
});

bootstrap();
</script>
</body>
</html>
